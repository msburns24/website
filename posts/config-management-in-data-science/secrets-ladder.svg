<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480">
  <rect width="700" height="480" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="350" y="34" text-anchor="middle" fill="#cdd6f4" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700">Secrets Management Escalation</text>
  <text x="350" y="54" text-anchor="middle" fill="#6c7086" font-family="system-ui,-apple-system,sans-serif" font-size="12">"Once secrets are pushed to Git, they are already compromised."</text>

  <!-- Upward arrow on left side -->
  <defs>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 Z" fill="#45475a"/>
    </marker>
  </defs>
  <line x1="80" y1="430" x2="80" y2="95" stroke="#313244" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <text x="62" y="300" fill="#45475a" font-family="system-ui,-apple-system,sans-serif" font-size="11" text-anchor="middle" transform="rotate(-90, 62, 300)">← escalation path</text>

  <!-- TIER 1 (bottom): Hardcoded — DANGER -->
  <rect x="105" y="360" width="530" height="80" rx="8" fill="#2a1520" stroke="#f38ba8" stroke-width="1.5"/>
  <rect x="105" y="360" width="4" height="80" rx="2" fill="#f38ba8"/>
  <text x="133" y="383" fill="#f38ba8" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700">⛔  NEVER — Hardcoded Secrets</text>
  <text x="133" y="401" fill="#eba0ac" font-family="monospace" font-size="11">API_KEY = "sk-abc123"  #  directly in source code</text>
  <text x="133" y="420" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Exposed in git history forever · Leaks on every clone/fork</text>

  <!-- Connector arrow (tier 1 → tier 2) -->
  <defs>
    <marker id="arrUp2" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 Z" fill="#45475a"/>
    </marker>
  </defs>
  <line x1="370" y1="358" x2="370" y2="320" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrUp2)"/>

  <!-- TIER 2 (middle): .env + env vars — LOCAL DEV -->
  <rect x="105" y="230" width="530" height="88" rx="8" fill="#2a2010" stroke="#f9e2af" stroke-width="1.5"/>
  <rect x="105" y="230" width="4" height="88" rx="2" fill="#f9e2af"/>
  <text x="133" y="254" fill="#f9e2af" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700">⚠  LOCAL DEV — .env File + Environment Variables</text>
  <text x="133" y="272" fill="#fab387" font-family="monospace" font-size="11">python-dotenv loads .env  ·  .env listed in .gitignore</text>
  <text x="133" y="290" fill="#fab387" font-family="monospace" font-size="11">os.getenv("API_KEY")  or  Pydantic BaseSettings</text>
  <text x="133" y="308" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Never commit .env  ·  Suitable for local development only</text>

  <!-- Connector arrow (tier 2 → tier 3) -->
  <line x1="370" y1="228" x2="370" y2="190" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrUp2)"/>

  <!-- TIER 3 (top): Cloud secret managers — PRODUCTION -->
  <rect x="105" y="95" width="530" height="90" rx="8" fill="#122416" stroke="#a6e3a1" stroke-width="1.5"/>
  <rect x="105" y="95" width="4" height="90" rx="2" fill="#a6e3a1"/>
  <text x="133" y="119" fill="#a6e3a1" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700">✅  PRODUCTION — Managed Secret Stores</text>
  <text x="133" y="138" fill="#94e2d5" font-family="monospace" font-size="11">AWS Secrets Manager  ·  Azure Key Vault  ·  GCP Secret Manager</text>
  <text x="133" y="156" fill="#94e2d5" font-family="monospace" font-size="11">HashiCorp Vault  ·  injected via Docker / Kubernetes / CI</text>
  <text x="133" y="174" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Auditable access  ·  Rotation support  ·  Least-privilege IAM</text>

  <!-- Litmus test note -->
  <text x="350" y="462" text-anchor="middle" fill="#45475a" font-family="system-ui,-apple-system,sans-serif" font-size="11">Litmus test: could you open-source this repo right now without leaking a credential?</text>
</svg>
