  <rect
     width="700"
     height="480"
     fill="#1e1e2e"
     id="rect1" />
  <!-- Title -->
  <text
     x="350"
     y="34"
     text-anchor="middle"
     fill="#cdd6f4"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="17"
     font-weight="700"
     id="text1">Secrets Management Escalation</text>
  <text
     x="350"
     y="54"
     text-anchor="middle"
     fill="#6c7086"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="12"
     id="text2">&quot;Once secrets are pushed to Git, they are already compromised.&quot;</text>
  <!-- Upward arrow on left side -->
  <defs
     id="defs2">
    <marker
       style="overflow:visible"
       id="Triangle"
       refX="0"
       refY="0"
       orient="auto-start-reverse"
       inkscape:stockid="Triangle arrow"
       markerWidth="0.75"
       markerHeight="0.75"
       viewBox="0 0 1 1"
       inkscape:isstock="true"
       inkscape:collect="always"
       preserveAspectRatio="xMidYMid">
      <path
         transform="scale(0.5)"
         style="fill:context-stroke;fill-rule:evenodd;stroke:context-stroke;stroke-width:1pt"
         d="M 5.77,0 -2.88,5 V -5 Z"
         id="path135" />
    </marker>
    <marker
       id="arrowUp"
       viewBox="0 0 10 10"
       refX="5"
       refY="1"
       markerWidth="8"
       markerHeight="8"
       orient="auto">
      <path
         d="M 0 10 L 5 0 L 10 10 Z"
         fill="#45475a"
         id="path2" />
    </marker>
  </defs>
  <text
     x="62"
     y="300"
     fill="#45475a"
     font-family="system-ui, '-apple-system', sans-serif"
     font-size="11px"
     text-anchor="middle"
     transform="rotate(-90,62,300)"
     id="text3">escalation path</text>
  <!-- TIER 1 (bottom): Hardcoded — DANGER -->
  <rect
     x="105"
     y="360"
     width="530"
     height="80"
     rx="0"
     fill="#2a1520"
     stroke="#f38ba8"
     stroke-width="1.5"
     id="rect3" />
  <rect
     x="105"
     y="360"
     width="4"
     height="80"
     rx="0"
     fill="#f38ba8"
     id="rect4" />
  <text
     x="133"
     y="383"
     fill="#f38ba8"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="13"
     font-weight="700"
     id="text4">⛔  NEVER — Hardcoded Secrets</text>
  <text
     x="133"
     y="401"
     fill="#eba0ac"
     font-family="monospace"
     font-size="11"
     id="text5">API_KEY = &quot;sk-abc123&quot;  #  directly in source code</text>
  <text
     x="133"
     y="420"
     fill="#585b70"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="10.5"
     id="text6">Exposed in git history forever · Leaks on every clone/fork</text>
  <!-- Connector arrow (tier 1 → tier 2) -->
  <defs
     id="defs6">
    <marker
       id="arrUp2"
       viewBox="0 0 10 10"
       refX="5"
       refY="1"
       markerWidth="6"
       markerHeight="6"
       orient="auto">
      <path
         d="M 0 10 L 5 0 L 10 10 Z"
         fill="#45475a"
         id="path6" />
    </marker>
  </defs>
  <!-- TIER 2 (middle): .env + env vars — LOCAL DEV -->
  <rect
     x="105"
     y="230"
     width="530"
     height="88"
     rx="0"
     fill="#2a2010"
     stroke="#f9e2af"
     stroke-width="1.5"
     id="rect6" />
  <rect
     x="105"
     y="230"
     width="4"
     height="88"
     rx="0"
     fill="#f9e2af"
     id="rect7" />
  <text
     x="133"
     y="254"
     fill="#f9e2af"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="13"
     font-weight="700"
     id="text7">⚠  LOCAL DEV — .env File + Environment Variables</text>
  <text
     x="133"
     y="272"
     fill="#fab387"
     font-family="monospace"
     font-size="11"
     id="text8">python-dotenv loads .env  ·  .env listed in .gitignore</text>
  <text
     x="133"
     y="290"
     fill="#fab387"
     font-family="monospace"
     font-size="11"
     id="text9">os.getenv(&quot;API_KEY&quot;)  or  Pydantic BaseSettings</text>
  <text
     x="133"
     y="308"
     fill="#585b70"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="10.5"
     id="text10">Never commit .env  ·  Suitable for local development only</text>
  <!-- Connector arrow (tier 2 → tier 3) -->
  <!-- TIER 3 (top): Cloud secret managers — PRODUCTION -->
  <rect
     x="105"
     y="95"
     width="530"
     height="90"
     rx="0"
     fill="#122416"
     stroke="#a6e3a1"
     stroke-width="1.5"
     id="rect10" />
  <rect
     x="105"
     y="95"
     width="4"
     height="90"
     rx="0"
     fill="#a6e3a1"
     id="rect11" />
  <text
     x="133"
     y="119"
     fill="#a6e3a1"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="13"
     font-weight="700"
     id="text11">✅  PRODUCTION — Managed Secret Stores</text>
  <text
     x="133"
     y="138"
     fill="#94e2d5"
     font-family="monospace"
     font-size="11"
     id="text12">AWS Secrets Manager  ·  Azure Key Vault  ·  GCP Secret Manager</text>
  <text
     x="133"
     y="156"
     fill="#94e2d5"
     font-family="monospace"
     font-size="11"
     id="text13">HashiCorp Vault  ·  injected via Docker / Kubernetes / CI</text>
  <text
     x="133"
     y="174"
     fill="#585b70"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="10.5"
     id="text14">Auditable access  ·  Rotation support  ·  Least-privilege IAM</text>
  <!-- Litmus test note -->
  <text
     x="350"
     y="462"
     text-anchor="middle"
     fill="#45475a"
     font-family="system-ui,-apple-system,sans-serif"
     font-size="11"
     id="text15">Litmus test: could you open-source this repo right now without leaking a credential?</text>
  <path
     style="fill:none;fill-opacity:1;stroke:#45475a;stroke-width:1.69607;stroke-linejoin:round;stroke-dasharray:5.08822, 5.08822;stroke-dashoffset:0;stroke-opacity:1;marker-end:url(#Triangle)"
     d="M 370,226.70142 V 194.33896"
     id="path15"
