<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#cdd6f4" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="700">Reproducibility: The Core Problem</text>

  <!-- ===== LEFT PANEL: Bad (hardcoded) ===== -->
  <rect x="30" y="52" width="355" height="316" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Panel header -->
  <rect x="30" y="52" width="355" height="36" rx="8" fill="#2a1520"/>
  <rect x="30" y="72" width="355" height="16" fill="#2a1520"/>
  <text x="207" y="76" text-anchor="middle" fill="#f38ba8" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700">✗  Hardcoded Constants</text>
  <!-- Window dots -->
  <circle cx="50" cy="70" r="5" fill="#f38ba8" opacity="0.8"/>
  <circle cx="66" cy="70" r="5" fill="#45475a" opacity="0.8"/>
  <circle cx="82" cy="70" r="5" fill="#45475a" opacity="0.8"/>

  <!-- Code lines -->
  <text x="50" y="108" fill="#45475a" font-family="monospace" font-size="11">1</text>
  <text x="75" y="108" fill="#6c7086" font-family="monospace" font-size="11"># train.py</text>

  <text x="50" y="126" fill="#45475a" font-family="monospace" font-size="11">2</text>
  <text x="75" y="126" fill="#a6adc8" font-family="monospace" font-size="11">LEARNING_RATE = </text>
  <text x="235" y="126" fill="#f38ba8" font-family="monospace" font-size="11">0.001</text>
  <text x="272" y="126" fill="#45475a" font-family="monospace" font-size="9">  # try 0.01?</text>

  <text x="50" y="144" fill="#45475a" font-family="monospace" font-size="11">3</text>
  <text x="75" y="144" fill="#a6adc8" font-family="monospace" font-size="11">EPOCHS = </text>
  <text x="163" y="144" fill="#f38ba8" font-family="monospace" font-size="11">50</text>
  <text x="184" y="144" fill="#45475a" font-family="monospace" font-size="9">  # was 100 yesterday</text>

  <text x="50" y="162" fill="#45475a" font-family="monospace" font-size="11">4</text>
  <text x="75" y="162" fill="#a6adc8" font-family="monospace" font-size="11">BATCH_SIZE = </text>
  <text x="186" y="162" fill="#f38ba8" font-family="monospace" font-size="11">32</text>

  <text x="50" y="180" fill="#45475a" font-family="monospace" font-size="11">5</text>
  <text x="75" y="180" fill="#a6adc8" font-family="monospace" font-size="11">MODEL = </text>
  <text x="155" y="180" fill="#fab387" font-family="monospace" font-size="11">"resnet50"</text>
  <text x="247" y="180" fill="#45475a" font-family="monospace" font-size="9">  # or resnet18?</text>

  <text x="50" y="198" fill="#45475a" font-family="monospace" font-size="11">6</text>
  <text x="75" y="198" fill="#a6adc8" font-family="monospace" font-size="11">DATA_PATH = </text>
  <text x="182" y="198" fill="#fab387" font-family="monospace" font-size="11">"/home/me/data"</text>

  <!-- Warning badge -->
  <rect x="50" y="220" width="316" height="48" rx="6" fill="#2a1520" stroke="#f38ba8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="208" y="240" text-anchor="middle" fill="#f38ba8" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">What experiment was run last Tuesday?</text>
  <text x="208" y="258" text-anchor="middle" fill="#7f849c" font-family="system-ui,-apple-system,sans-serif" font-size="10">Unknown — values changed in-place, no record</text>

  <text x="208" y="302" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Edit code → re-run → repeat → lose track</text>
  <text x="208" y="320" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Config changes = code changes = git noise</text>
  <text x="208" y="338" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Secrets risk if API keys live here</text>
  <text x="208" y="356" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Merging branches = merge conflict hell</text>

  <!-- ===== RIGHT PANEL: Good (config file) ===== -->
  <rect x="415" y="52" width="355" height="316" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Panel header -->
  <rect x="415" y="52" width="355" height="36" rx="8" fill="#122416"/>
  <rect x="415" y="72" width="355" height="16" fill="#122416"/>
  <text x="592" y="76" text-anchor="middle" fill="#a6e3a1" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700">✓  Externalized Config</text>
  <circle cx="435" cy="70" r="5" fill="#a6e3a1" opacity="0.8"/>
  <circle cx="451" cy="70" r="5" fill="#45475a" opacity="0.8"/>
  <circle cx="467" cy="70" r="5" fill="#45475a" opacity="0.8"/>

  <!-- config.yaml label -->
  <text x="435" y="104" fill="#6c7086" font-family="monospace" font-size="10">config.yaml</text>

  <text x="435" y="122" fill="#45475a" font-family="monospace" font-size="11">1</text>
  <text x="460" y="122" fill="#cba6f7" font-family="monospace" font-size="11">model:</text>

  <text x="435" y="140" fill="#45475a" font-family="monospace" font-size="11">2</text>
  <text x="460" y="140" fill="#89b4fa" font-family="monospace" font-size="11">  learning_rate: </text>
  <text x="604" y="140" fill="#94e2d5" font-family="monospace" font-size="11">0.001</text>

  <text x="435" y="158" fill="#45475a" font-family="monospace" font-size="11">3</text>
  <text x="460" y="158" fill="#89b4fa" font-family="monospace" font-size="11">  epochs: </text>
  <text x="549" y="158" fill="#94e2d5" font-family="monospace" font-size="11">50</text>

  <text x="435" y="176" fill="#45475a" font-family="monospace" font-size="11">4</text>
  <text x="460" y="176" fill="#89b4fa" font-family="monospace" font-size="11">  batch_size: </text>
  <text x="565" y="176" fill="#94e2d5" font-family="monospace" font-size="11">32</text>

  <text x="435" y="194" fill="#45475a" font-family="monospace" font-size="11">5</text>
  <text x="460" y="194" fill="#89b4fa" font-family="monospace" font-size="11">  arch: </text>
  <text x="521" y="194" fill="#fab387" font-family="monospace" font-size="11">"resnet50"</text>

  <!-- git log snippet -->
  <rect x="435" y="214" width="316" height="72" rx="6" fill="#11111b" stroke="#313244" stroke-width="1"/>
  <text x="448" y="230" fill="#6c7086" font-family="monospace" font-size="9.5">$ git log --oneline config.yaml</text>
  <text x="448" y="248" fill="#f9e2af" font-family="monospace" font-size="9.5">a3f7c2e</text>
  <text x="505" y="248" fill="#a6e3a1" font-family="monospace" font-size="9.5"> lr=0.001, epochs=50 (best so far)</text>
  <text x="448" y="264" fill="#f9e2af" font-family="monospace" font-size="9.5">b18d941</text>
  <text x="505" y="264" fill="#a6e3a1" font-family="monospace" font-size="9.5"> try lr=0.01, epochs=100</text>
  <text x="448" y="280" fill="#f9e2af" font-family="monospace" font-size="9.5">c9e5312</text>
  <text x="505" y="280" fill="#a6e3a1" font-family="monospace" font-size="9.5"> baseline run, resnet18</text>

  <text x="592" y="318" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Code + config = reproducible experiment</text>
  <text x="592" y="336" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Every run is traceable in git history</text>
  <text x="592" y="354" text-anchor="middle" fill="#585b70" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Change env without touching source code</text>

  <!-- VS divider -->
  <text x="400" y="218" text-anchor="middle" fill="#45475a" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700">vs</text>
</svg>
